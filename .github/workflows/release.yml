name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: 386

          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: 386

          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: build binaries
        shell: bash
        run: |
          mkdir -p dist

          VERSION="${GITHUB_REF_NAME}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          OUTPUT="dist/gophertube-${{ matrix.goos }}-${{ matrix.goarch }}-${VERSION}${EXT}"

          echo "Building GopherTube with version: $VERSION"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags "-X gophertube/internal/app.version=${VERSION}" \
          -o "$OUTPUT" main.go

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gophertube-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd final
          sha256sum ./* > checksums.txt

      - name: create github release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            final/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
